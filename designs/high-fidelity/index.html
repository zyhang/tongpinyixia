<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>答案之外 · 安静夜间霓虹</title>
  <style>
    :root { --bg:#060910; --surface:#0d1420; --surface-2:#111c2a; --ink:#f4f7fa; --muted:#8c97a6; --line:rgba(137,166,189,.24); --cyan:#48cdda; --pink:#eb72ad; --violet:#9385f5; --dark:#071218; --font:"PingFang SC","Helvetica Neue",sans-serif; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; background:var(--bg); color:var(--ink); font-family:var(--font); -webkit-font-smoothing:antialiased; }
    button { font:inherit; }
    .screen { position:relative; width:100vw; height:100vh; min-height:760px; overflow:hidden; padding:18px 22px 22px; display:flex; flex-direction:column; background:radial-gradient(circle at 100% 12%,rgba(72,205,218,.10),transparent 32%),radial-gradient(circle at 0 88%,rgba(235,114,173,.08),transparent 31%),linear-gradient(155deg,#070b12 0%,#060912 55%,#070a10 100%); }
    .screen::before { content:""; position:absolute; top:106px; left:22px; right:22px; height:1px; background:linear-gradient(90deg,transparent,rgba(72,205,218,.28),transparent); }
    .status { display:flex; justify-content:space-between; align-items:center; height:24px; font-weight:700; font-size:12px; }
    .status-icons { display:flex; gap:6px; align-items:center; color:#dfe7eb; }
    .signal { width:15px; height:9px; border:1.5px solid currentColor; border-top:0; border-radius:0 0 3px 3px; } .wifi { width:11px; height:11px; border:1.5px solid currentColor; border-left:0; border-bottom:0; border-radius:0 6px 0 0; transform:rotate(-45deg); } .battery { width:18px; height:9px; border:1.5px solid currentColor; border-radius:3px; box-shadow:inset -4px 0 0 currentColor; }
    .brand { display:flex; align-items:center; gap:9px; margin-top:14px; padding-bottom:12px; }
    .wave { width:30px; height:19px; flex:0 0 30px; } .wave path { fill:none; stroke:var(--cyan); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .brand-name { font-size:15px; font-weight:760; letter-spacing:.08em; } .brand-sub { margin-top:2px; color:var(--muted); font-size:8px; letter-spacing:.10em; }
    .main { flex:1; min-height:0; display:flex; flex-direction:column; }
    .meta { align-self:center; margin:18px 0 14px; padding:7px 13px; border:1px solid var(--line); border-radius:999px; color:#9da8b5; background:rgba(11,19,30,.8); font-size:11px; }
    .card { border:1px solid transparent; border-radius:22px; background:linear-gradient(var(--surface),var(--surface)) padding-box,linear-gradient(125deg,rgba(235,114,173,.72),rgba(72,205,218,.7)) border-box; }
    .question-main { justify-content:center; padding-bottom:16px; }
    .question-card { padding:25px 19px 19px; box-shadow:0 22px 55px rgba(0,0,0,.31); }
    .question-mark { width:40px; height:40px; display:grid; place-items:center; margin:0 auto 14px; border:1px solid var(--cyan); border-radius:50%; color:var(--cyan); font-size:21px; }
    .question-guide { margin:0 0 8px; color:var(--muted); text-align:center; font-size:11px; } .question-title { margin:0 0 22px; text-align:center; font-size:26px; line-height:1.38; letter-spacing:.01em; }
    .choices { display:grid; gap:11px; } .choice { display:flex; align-items:center; gap:12px; min-height:59px; padding:10px 14px; border:1px solid rgba(126,159,183,.30); border-radius:15px; color:var(--ink); background:#101a27; text-align:left; font-size:16px; font-weight:700; }
    .choice b,.chip b { display:grid; place-items:center; flex:0 0 31px; width:31px; height:31px; border-radius:50%; color:#fff; background:var(--pink); font-size:13px; } .choice.alt b { color:#061418; background:var(--cyan); }
    .note { color:var(--muted); text-align:center; font-size:10px; line-height:1.6; } .question-card .note { margin-top:15px; }
    .result-top { padding:16px 0 14px; text-align:center; border-bottom:1px solid rgba(137,166,189,.15); }
    .chip { display:inline-flex; align-items:center; gap:8px; padding:6px 11px 6px 7px; border:1px solid var(--line); border-radius:999px; color:#dfe6eb; font-size:11px; background:rgba(10,18,28,.68); } .chip b { width:23px; height:23px; flex-basis:23px; background:var(--pink); font-size:11px; }
    .result-stat { display:flex; align-items:baseline; justify-content:center; gap:8px; margin-top:12px; font-size:17px; font-weight:700; } .ratio { color:var(--cyan); font-size:72px; font-weight:800; line-height:1; letter-spacing:-.06em; text-shadow:0 0 28px rgba(72,205,218,.16); } .ratio span { font-size:30px; letter-spacing:-.03em; } .result-top h1 { margin:2px 0 0; font-size:24px; } .result-top p { margin:8px 0 0; color:var(--muted); font-size:11px; }
    .reason-block { padding-top:15px; } .section-label { margin-bottom:9px; font-size:13px; font-weight:700; }
    .quote { padding:16px 16px 10px; background:linear-gradient(145deg,rgba(20,29,42,.98),rgba(11,19,30,.98)) padding-box,linear-gradient(125deg,rgba(235,114,173,.62),rgba(72,205,218,.62)) border-box; } .quote-text { min-height:54px; margin:0; font-size:16px; font-weight:650; line-height:1.62; } .quote-footer { display:flex; flex-direction:column; align-items:stretch; margin-top:10px; padding-top:8px; border-top:1px solid rgba(137,166,189,.16); } .quote-source { color:var(--muted); font-size:9px; } .quote-actions { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:9px; } .text-action { min-height:40px; display:flex; align-items:center; justify-content:center; gap:5px; padding:0 7px; border:1px solid rgba(137,166,189,.28); border-radius:10px; color:#d9e1e7; background:#101925; font-size:10px; font-weight:650; } .text-action .action-icon { color:var(--cyan); font-size:13px; } .text-action.active { border-color:rgba(72,205,218,.60); color:var(--cyan); background:rgba(72,205,218,.10); } .text-action:disabled { opacity:1; } .resonance-count { min-height:24px; margin-top:7px; color:#9ee5e9; font-size:10px; text-align:center; } .resonance-count:not(:empty) { padding:5px 8px; border-radius:7px; background:rgba(72,205,218,.09); }
    .actions { display:grid; gap:9px; margin-top:auto; padding-top:14px; } .btn { min-height:52px; border:1px solid var(--line); border-radius:15px; color:var(--ink); background:#101924; font-weight:700; letter-spacing:.03em; } .btn.primary { border:0; color:#061318; background:linear-gradient(100deg,#69d8df,#43bed4); box-shadow:0 12px 28px rgba(72,205,218,.14); } .result-boundary { margin-top:8px; }
    .nav { display:grid; grid-template-columns:32px 1fr 32px; align-items:center; min-height:48px; border-bottom:1px solid rgba(137,166,189,.16); } .nav strong { text-align:center; font-size:15px; } .back { color:#dfe7eb; font-size:26px; line-height:1; }
    .posting-choice { display:flex; align-items:center; gap:8px; margin:25px 0 16px; font-size:20px; font-weight:700; } .posting-choice strong { padding:7px 11px; border-radius:999px; color:#fff; background:linear-gradient(110deg,#d65e9f,#926fe1); font-size:15px; }
    .input { position:relative; min-height:222px; padding:17px; border:1px solid transparent; border-radius:17px; background:linear-gradient(#0f1723,#0f1723) padding-box,linear-gradient(125deg,rgba(235,114,173,.72),rgba(72,205,218,.72)) border-box; } .placeholder { color:#7f8b9b; font-size:16px; } .value { color:#eef3f7; font-size:16px; line-height:1.7; } .count { position:absolute; right:15px; bottom:13px; color:var(--muted); font-size:11px; } .posting-note { margin:10px 2px 14px; color:var(--muted); font-size:11px; } .disabled { color:#65717f; border:0; background:#17222e; box-shadow:none; }
    .success { justify-content:center; text-align:center; } .success-mark { width:62px; height:62px; display:grid; place-items:center; margin:0 auto 20px; border:1px solid var(--cyan); border-radius:50%; color:var(--cyan); font-size:29px; box-shadow:0 0 36px rgba(72,205,218,.11); } .success h1 { margin:0 0 12px; font-size:24px; } .success p { max-width:295px; margin:0 auto; color:var(--muted); font-size:12px; line-height:1.75; }
    .gallery { padding:35px; background:#11161e; } .gallery h1 { color:#f5f7fb; } .gallery p { color:#aab4bf; } .gallery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:22px; } .gallery-item { color:#f5f7fb; } .gallery-item h2 { font-size:14px; } .gallery iframe { width:390px; height:844px; border:0; border-radius:25px; transform:scale(.78); transform-origin:top left; margin-bottom:-185px; }
  </style>
</head>
<body>
  <script>
    const page = new URLSearchParams(location.search).get('page');
    const status = `<div class="status"><span>9:41</span><div class="status-icons"><i class="signal"></i><i class="wifi"></i><i class="battery"></i></div></div>`;
    const brand = `<div class="brand"><svg class="wave" viewBox="0 0 32 18"><path d="M1 10h5l2-7 4 14 4-11 4 7 3-6 3 3h5"/></svg><div><div class="brand-name">答案之外</div><div class="brand-sub">选择之后，听见真实的想法</div></div></div>`;
    const templates = {
      question: `<main class="screen">${status}${brand}<section class="main question-main"><div class="meta">今日一问 · 已有 128,672 人作答</div><div class="card question-card"><div class="question-mark">?</div><p class="question-guide">如果是你，会怎么选？</p><h1 class="question-title">朋友失恋时，<br>你会怎么陪？</h1><div class="choices"><button class="choice"><b>A</b><span>陪他一起骂</span></button><button class="choice alt"><b>B</b><span>认真分析问题</span></button></div><div class="note">匿名选择 · 无需解释</div></div></section><div class="note">选择之后，你会看到有多少人和你一样。</div></main>`,
      result: `<main class="screen">${status}${brand}<section class="main"><div class="result-top"><div class="chip"><b>A</b><span>你选择了「A 陪他一起骂」</span></div><div class="result-stat"><span>有</span><strong class="ratio">27<span>%</span></strong><span>的作答者</span></div><h1>和你选了一样</h1><p>来自本题 128,672 次有效作答</p></div><section class="reason-block"><div class="section-label">相同的答案背后，会是相同的理由吗？</div><div class="card quote"><p class="quote-text">“有时候朋友需要的不是答案，<br>是有人先站在他这边。”</p><div class="quote-footer"><span class="quote-source">来自已授权匿名理由库 · 非实时匹配</span><div class="quote-actions"><button class="text-action"><span class="action-icon">✦</span>这句话说中了我</button><button class="text-action"><span class="action-icon">↻</span>再看一种想法</button></div></div><div class="resonance-count"></div></div></section><div class="actions"><button class="btn primary">再看一道题</button><button class="btn">我也想说说为什么</button><div class="note result-boundary">不展示身份 · 不建立联系 · 只留下真实想法</div></div></section></main>`,
      reacted: `<main class="screen">${status}${brand}<section class="main"><div class="result-top"><div class="chip"><b>A</b><span>你选择了「A 陪他一起骂」</span></div><div class="result-stat"><span>有</span><strong class="ratio">27<span>%</span></strong><span>的作答者</span></div><h1>和你选了一样</h1><p>来自本题 128,672 次有效作答</p></div><section class="reason-block"><div class="section-label">相同的答案背后，会是相同的理由吗？</div><div class="card quote"><p class="quote-text">“有时候朋友需要的不是答案，<br>是有人先站在他这边。”</p><div class="quote-footer"><span class="quote-source">来自已授权匿名理由库 · 非实时匹配</span><div class="quote-actions"><button class="text-action active" disabled><span class="action-icon">✓</span>原来你也这样想</button><button class="text-action"><span class="action-icon">↻</span>再看一种想法</button></div></div><div class="resonance-count">还有 1,284 人也被这句话戳中</div></div></section><div class="actions"><button class="btn primary">再看一道题</button><button class="btn">我也想说说为什么</button><div class="note result-boundary">不展示身份 · 不建立联系 · 只留下真实想法</div></div></section></main>`,
      'posting-empty': `<main class="screen">${status}<div class="nav"><span class="back">‹</span><strong>写下答案之外</strong><span></span></div><section class="main"><div class="posting-choice"><span>我选择</span><strong>陪他一起骂</strong><span>，因为</span></div><div class="input"><span class="placeholder">写下当时的想法</span><span class="count">0 / 60</span></div><p class="posting-note">一句真实的话就够了。</p><button class="btn disabled">再写一点，就能让它飘走</button></section></main>`,
      'posting-ready': `<main class="screen">${status}<div class="nav"><span class="back">‹</span><strong>写下答案之外</strong><span></span></div><section class="main"><div class="posting-choice"><span>我选择</span><strong>陪他一起骂</strong><span>，因为</span></div><div class="input"><span class="value">有时候他需要的不是建议，而是有人先和他站在一起。</span><span class="count">26 / 60</span></div><p class="posting-note">一句真实的话就够了。</p><button class="btn primary">让这句话飘进答案之外</button></section></main>`,
      'posting-success': `<main class="screen">${status}<div class="nav"><span></span><strong>答案之外</strong><span></span></div><section class="main success"><div class="success-mark">✓</div><h1>好啦，这句话飘出去了</h1><p>也许很快，也许过一阵，它会被某个同样选择的人碰见。随缘，不催。</p><div class="actions"><button class="btn primary">再看一道题</button><button class="btn">今天先到这，收工</button></div></section></main>`
    };
    if (page && templates[page]) { document.body.innerHTML = templates[page]; document.title = `答案之外 · ${page}`; }
    else { const pages = [['question','01 今日一问'],['result','02 选择结果'],['reacted','02B 共鸣反馈'],['posting-empty','03A 写下答案之外'],['posting-ready','03B 可以放进去'],['posting-success','04 这句话飘出去了']]; document.body.className='gallery'; document.body.innerHTML=`<h1>答案之外 · 安静夜间霓虹</h1><p>高保真 MVP 流程 · 深色克制、低压力、强调真实理由。</p><div class="gallery-grid">${pages.map(([id,label])=>`<article class="gallery-item"><h2>${label}</h2><iframe src="?page=${id}"></iframe></article>`).join('')}</div>`; }
  </script>
</body>
</html>
