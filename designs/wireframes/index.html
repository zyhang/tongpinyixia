<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>答案之外 · MVP 线框图</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --paper: #f4f4f1;
      --panel: #fff;
      --ink: #171717;
      --muted: #686868;
      --line: #b8b8b2;
      --soft: #e9e9e4;
      --dark: #262626;
    }
    html, body { margin: 0; min-height: 100%; }
    body {
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }
    button, a { font: inherit; }
    button { color: inherit; }
    .board { max-width: 1640px; margin: 0 auto; padding: 42px 34px 70px; }
    .board-head { display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: end; margin-bottom: 30px; }
    .board-head h1 { margin: 0 0 8px; font-size: 32px; }
    .board-head p { max-width: 760px; margin: 0; color: var(--muted); line-height: 1.7; }
    .decision {
      max-width: 470px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      font-size: 14px;
      line-height: 1.6;
    }
    .flow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .flow b { padding: 8px 12px; border: 1px solid var(--line); border-radius: 999px; color: var(--ink); background: var(--panel); }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(340px, 1fr)); gap: 34px 28px; align-items: start; }
    .frame-item { min-width: 0; }
    .frame-title { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin: 0 auto 10px; max-width: 390px; }
    .frame-title h2 { margin: 0; font-size: 17px; }
    .frame-title a { color: var(--muted); font-size: 12px; }
    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      margin: 0 auto;
      overflow: hidden;
      border: 2px solid var(--ink);
      border-radius: 36px;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(0,0,0,.08);
    }
    .screen { height: 100%; padding: 18px 20px 22px; display: flex; flex-direction: column; }
    .status { display: flex; justify-content: space-between; height: 24px; font-size: 12px; font-weight: 700; }
    .nav { display: grid; grid-template-columns: 32px 1fr 32px; align-items: center; min-height: 48px; border-bottom: 1px solid var(--soft); }
    .nav strong { text-align: center; font-size: 15px; }
    .back { font-size: 25px; line-height: 1; }
    .brand { padding: 13px 0 12px; border-bottom: 1px solid var(--soft); font-weight: 750; }
    .brand-title { display: flex; align-items: center; gap: 7px; }
    .brand-badge { padding: 2px 6px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font-size: 9px; font-weight: 600; }
    .brand small { display: block; margin-top: 2px; color: var(--muted); font-weight: 400; font-size: 10px; }
    .content { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .meta { align-self: center; margin: 20px 0 14px; padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font-size: 11px; }
    .card { border: 1px solid var(--ink); border-radius: 16px; background: var(--panel); }
    .question-card { margin: auto 0; padding: 28px 18px 20px; }
    .question-card .mark { width: 38px; height: 38px; display: grid; place-items: center; margin: 0 auto 18px; border: 1px solid var(--ink); border-radius: 50%; }
    h1 { letter-spacing: .01em; }
    .question-card h1 { margin: 0 0 24px; text-align: center; font-size: 25px; line-height: 1.4; }
    .question-guide { margin: 0 0 8px; color: var(--muted); text-align: center; font-size: 12px; }
    .choices { display: grid; gap: 11px; }
    .choice { width: 100%; min-height: 58px; display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid var(--ink); border-radius: 12px; background: white; text-align: left; font-weight: 700; cursor: pointer; }
    .choice b, .chip b { display: grid; place-items: center; flex: 0 0 30px; width: 30px; height: 30px; border: 1px solid var(--ink); border-radius: 50%; }
    .note { color: var(--muted); font-size: 11px; text-align: center; line-height: 1.6; }
    .question-empathy { margin: 17px 0 0; color: var(--muted); text-align: center; font-size: 12px; line-height: 1.6; }
    .result-top { padding: 17px 0 15px; text-align: center; border-bottom: 1px solid var(--soft); }
    .chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 11px 6px 7px; border: 1px solid var(--line); border-radius: 999px; font-size: 11px; }
    .chip b { flex-basis: 23px; width: 23px; height: 23px; background: var(--soft); }
    .result-stat { display: flex; align-items: baseline; justify-content: center; gap: 9px; margin-top: 12px; font-size: 18px; font-weight: 700; }
    .ratio { font-size: 72px; line-height: 1; font-weight: 800; letter-spacing: -.04em; }
    .ratio span { font-size: 30px; }
    .result-top h2 { margin: 3px 0 0; font-size: 24px; }
    .result-top p { margin: 8px 0 0; color: var(--muted); font-size: 12px; }
    .reason-block { padding: 16px 0 0; }
    .section-label { margin-bottom: 10px; font-size: 13px; font-weight: 700; }
    .quote { padding: 16px 16px 10px; background: #fafafa; }
    .quote.reacted { border-color: var(--ink); background: #f1f1ec; }
    .quote-text { min-height: 56px; margin: 0; font-size: 17px; font-weight: 650; line-height: 1.65; }
    .quote-footer { display: flex; flex-direction: column; align-items: flex-start; gap: 0; margin-top: 9px; border-top: 1px solid var(--soft); }
    .quote-source { color: var(--muted); font-size: 10px; white-space: nowrap; }
    .quote-actions { align-self: flex-end; display: flex; align-items: center; gap: 3px; margin-top: -4px; }
    .text-action { min-height: 44px; padding: 0 7px; border: 0; color: var(--muted); background: transparent; font-size: 11px; font-weight: 650; cursor: pointer; }
    .text-action.active { color: white; background: var(--dark); border-radius: 7px; }
    .text-action:disabled { opacity: 1; cursor: default; }
    .resonance-count { min-height: 24px; color: var(--muted); font-size: 11px; text-align: center; }
    .resonance-count:not(:empty) { padding: 4px 8px; border-radius: 6px; background: var(--soft); }
    .resonance-count.selected { color: var(--ink); font-weight: 650; background: #d9ebe8; }
    .btn { min-height: 48px; padding: 10px 13px; border: 1px solid var(--ink); border-radius: 10px; background: white; font-weight: 700; cursor: pointer; }
    .btn.primary { color: white; background: var(--dark); }
    .result-cta { margin-top: auto; padding-top: 14px; display: grid; gap: 9px; }
    .result-cta .btn { min-height: 52px; }
    .posting-choice { display: flex; align-items: center; gap: 8px; margin: 24px 0 12px; font-size: 18px; font-weight: 700; }
    .posting-choice strong { padding: 7px 11px; border-radius: 999px; color: white; background: var(--dark); font-size: 15px; }
    .input { position: relative; min-height: 210px; padding: 17px; border: 1px solid var(--ink); border-radius: 14px; }
    .placeholder { color: #969696; font-size: 16px; }
    .value { font-size: 16px; line-height: 1.7; }
    .count { position: absolute; right: 15px; bottom: 13px; color: var(--muted); font-size: 11px; }
    .posting-note { margin: 10px 2px 14px; color: var(--muted); font-size: 11px; line-height: 1.6; }
    .disabled { color: #999; border-color: #d2d2d2; background: #ededed; }
    .success { justify-content: center; text-align: center; }
    .success-mark { width: 62px; height: 62px; display: grid; place-items: center; margin: 0 auto 20px; border: 2px solid var(--ink); border-radius: 50%; font-size: 28px; }
    .success h1 { margin: 0 0 12px; font-size: 24px; line-height: 1.4; }
    .success > p { margin: 0 auto 12px; max-width: 290px; color: var(--muted); font-size: 12px; line-height: 1.7; }
    .caption { max-width: 390px; margin: 10px auto 0; color: var(--muted); font-size: 12px; line-height: 1.6; }
    .preview-mode { min-height: 100vh; display: grid; place-items: center; background: #d9d9d4; }
    .preview-mode .phone { width: min(390px, 100vw); height: min(844px, 100vh); border-radius: 0; border: 0; box-shadow: none; }
    @media (max-width: 1180px) { .grid { grid-template-columns: repeat(2, minmax(340px, 1fr)); } .board-head { grid-template-columns: 1fr; } }
    @media (max-width: 760px) { .board { padding: 24px 10px 50px; } .grid { grid-template-columns: 1fr; } .phone { width: min(390px, calc(100vw - 20px)); } .decision { max-width: none; } }
  </style>
</head>
<body>
  <main class="board" id="board">
    <header class="board-head">
      <div>
        <h1>答案之外 · MVP 线框图</h1>
        <p>选择一个更像你的答案，看看有多少人和你一样，再听听他们为什么这样选。</p>
      </div>
      <div class="decision"><strong>品牌主张</strong><br>答案只有两个，理由远不止两种。</div>
    </header>
    <nav class="flow" aria-label="核心流程">
      <b>MVP 主循环</b><span>01 选择答案 → 02 选择结果＋真实理由 → 再看一道题 ↺</span><b>可选支线</b><span>02 → 我也想说说为什么 → 让这句话飘进答案之外</span>
    </nav>
    <section class="grid" id="grid"></section>
  </main>

  <template id="question">
    <article class="phone"><div class="screen">
      <div class="status"><span>9:41</span><span>信号　电量</span></div>
      <div class="brand"><div class="brand-title">答案之外<span class="brand-badge">匿名</span></div><small>选择之后，听见真实的想法</small></div>
      <div class="content"><div class="meta">今日一问 · 已有 128,672 人作答</div>
        <section class="card question-card"><div class="mark">?</div><p class="question-guide">如果是你，会怎么选？</p><h1>朋友失恋时，<br>你会怎么陪？</h1>
          <div class="choices"><button class="choice" data-go="combined"><b>A</b><span>陪他一起骂</span></button><button class="choice" data-go="combined"><b>B</b><span>认真分析问题</span></button></div>
          <p class="question-empathy">想接住一个人的难过，本来就不只一种方式。</p>
        </section>
      </div>
    </div></article>
  </template>

  <template id="combined">
    <article class="phone"><div class="screen">
      <div class="status"><span>9:41</span><span>信号　电量</span></div>
      <div class="brand"><div class="brand-title">答案之外<span class="brand-badge">匿名</span></div><small>选择之后，听见真实的想法</small></div>
      <div class="content">
        <section class="result-top"><div class="chip"><b>A</b><span>你选择了「A 陪他一起骂」</span></div><div class="result-stat"><span>有</span><strong class="ratio">27<span>%</span></strong><span>的作答者</span></div><h2>和你选了一样</h2><p>来自本题 128,672 次有效作答</p></section>
        <section class="reason-block"><div class="section-label">相同的答案背后，会是相同的理由吗？</div>
          <div class="card quote">
            <p class="quote-text">“有时候朋友需要的不是答案，是有人先站在他这边。”</p>
            <div class="quote-footer"><span class="quote-source">来自已授权匿名理由库 · 非实时匹配</span><div class="quote-actions"><button class="text-action resonance-action" type="button" aria-pressed="false">这句话说中了我</button><button class="text-action refresh-action" type="button">再看一种想法</button></div></div>
            <div class="resonance-count" aria-live="polite"></div>
          </div>
        </section>
        <div class="result-cta"><button class="btn primary" data-go="question">再看一道题</button><button class="btn" data-go="posting-empty">我也想说说为什么</button></div>
      </div>
    </div></article>
  </template>

  <template id="posting-empty">
    <article class="phone"><div class="screen">
      <div class="status"><span>9:41</span><span>信号　电量</span></div><div class="nav"><span class="back">‹</span><strong>写下答案之外</strong><span></span></div>
      <div class="content"><div class="posting-choice"><span>我选择</span><strong>陪他一起骂</strong><span>，因为</span></div>
        <div class="input"><span class="placeholder">写下当时的想法</span><span class="count">0 / 60</span></div>
        <p class="posting-note">一句真实的话就够了。</p>
        <button class="btn disabled" data-go="posting-ready">再写一点，就能让它飘走</button>
      </div>
    </div></article>
  </template>

  <template id="posting-ready">
    <article class="phone"><div class="screen">
      <div class="status"><span>9:41</span><span>信号　电量</span></div><div class="nav"><span class="back">‹</span><strong>写下答案之外</strong><span></span></div>
      <div class="content"><div class="posting-choice"><span>我选择</span><strong>陪他一起骂</strong><span>，因为</span></div>
        <div class="input"><span class="value">有时候他需要的不是建议，而是有人先和他站在一起。</span><span class="count">26 / 60</span></div>
        <p class="posting-note">一句真实的话就够了。</p>
        <button class="btn primary" data-go="posting-success">让这句话飘进答案之外</button>
      </div>
    </div></article>
  </template>

  <template id="posting-success">
    <article class="phone"><div class="screen">
      <div class="status"><span>9:41</span><span>信号　电量</span></div><div class="nav"><span></span><strong>答案之外</strong><span></span></div>
      <div class="content success"><div class="success-mark">✓</div><h1>好啦，这句话飘出去了</h1>
        <p>也许很快，也许过一阵，它会被某个同样选择的人碰见。随缘，不催。</p>
        <div class="result-cta"><button class="btn primary" data-go="question">再看一道题</button><button class="btn">今天先到这，收工</button></div>
      </div>
    </div></article>
  </template>

  <script>
    const screens = [
      ['question', '01 今日一问', '选择后，直接看到本题的真实比例与理由。'],
      ['combined', '02 选择结果＋答案之外', '选择结果与真实理由在同一页呈现。'],
      ['combined-reacted', '02B 这句话说中了我', '点击后才显示有多少人也被这句话打动。'],
      ['posting-empty', '03A 写下答案之外 · 空态', '可选入口，不阻断再看一道题。'],
      ['posting-ready', '03B 写下答案之外 · 可以放进去', '一句话写好后，就能轻轻放进答案之外。'],
      ['posting-success', '04 这句话飘出去了', '随缘被同样选择的人碰见，轻松结束本次体验。']
    ];
    const params = new URLSearchParams(location.search);
    const current = params.get('screen');

    function cloneScreen(id) {
      const templateId = id === 'combined-reacted' ? 'combined' : id;
      const screen = document.getElementById(templateId).content.firstElementChild.cloneNode(true);
      if (id === 'combined-reacted') screen.dataset.initialReacted = 'true';
      return screen;
    }
    function openScreen(id) {
      location.href = `${location.pathname}?screen=${id}`;
    }
    function bindNavigation(root) {
      root.querySelectorAll('[data-go]').forEach(button => button.addEventListener('click', () => openScreen(button.dataset.go)));
    }
    function bindReasonInteractions(root) {
      const reasons = [
        { text: '“有时候朋友需要的不是答案，是有人先站在他这边。”', count: 1283 },
        { text: '“先陪他把气撒完吧，道理可以晚点再讲。”', count: 935 },
        { text: '“他已经够难受了，这时候站队比复盘重要。”', count: 2116 }
      ];
      root.querySelectorAll('.quote').forEach(card => {
        let index = 0;
        let reacted = card.closest('[data-initial-reacted="true"]') !== null;
        const copy = card.querySelector('.quote-text');
        const resonance = card.querySelector('.resonance-action');
        const refresh = card.querySelector('.refresh-action');
        const count = card.querySelector('.resonance-count');

        function renderReaction() {
          card.classList.toggle('reacted', reacted);
          resonance.classList.toggle('active', reacted);
          resonance.setAttribute('aria-pressed', String(reacted));
          resonance.disabled = reacted;
          resonance.textContent = reacted ? '✓ 原来你也这样想' : '这句话说中了我';
          count.classList.toggle('selected', reacted);
          count.textContent = reacted ? `还有 ${(reasons[index].count + 1).toLocaleString('zh-CN')} 人也被这句话戳中` : '';
        }
        resonance.addEventListener('click', () => {
          if (reacted) return;
          reacted = true;
          renderReaction();
        });
        refresh.addEventListener('click', () => {
          index = (index + 1) % reasons.length;
          reacted = false;
          copy.textContent = reasons[index].text;
          renderReaction();
        });
        renderReaction();
      });
    }

    if (current && screens.some(([id]) => id === current)) {
      const phone = cloneScreen(current);
      document.body.className = 'preview-mode';
      document.body.innerHTML = '';
      document.body.appendChild(phone);
      bindNavigation(document.body);
      bindReasonInteractions(document.body);
    } else {
      const grid = document.getElementById('grid');
      screens.forEach(([id, title, caption]) => {
        const item = document.createElement('article');
        item.className = 'frame-item';
        item.innerHTML = `<header class="frame-title"><h2>${title}</h2><a href="?screen=${id}">打开手机预览 ↗</a></header>`;
        item.appendChild(cloneScreen(id));
        item.insertAdjacentHTML('beforeend', `<p class="caption">${caption}</p>`);
        grid.appendChild(item);
      });
      bindNavigation(grid);
      bindReasonInteractions(grid);
    }
  </script>
</body>
</html>
